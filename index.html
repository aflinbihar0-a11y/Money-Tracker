<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pencatat Keuangan Mandiri</title>
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <div id="auth-container" style="margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; background: #fff; padding: 12px 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05);">
            <div id="user-info">
                <span id="status-user" style="font-size: 14px; font-weight: bold; color: #666;">Memuat status...</span>
            </div>
            <button id="auth-btn" style="width: auto; padding: 8px 16px; font-size: 13px; margin: 0; background: #3498db;">Masuk</button>
        </div>

        <h1>💰 Pencatat Keuangan</h1>
        
        <div class="balance-board">
            <h2>Total Saldo: <span id="total-saldo">Rp 0</span></h2>
            <div class="summary-container">
                <div class="summary-box">
                    <small>Total Pemasukan</small>
                    <p id="total-pemasukan" style="color: #2ecc71; font-weight: bold; margin: 5px 0 0 0;">Rp 0</p>
                </div>
                <div class="summary-box">
                    <small>Total Pengeluaran</small>
                    <p id="total-pengeluaran" style="color: #e74c3c; font-weight: bold; margin: 5px 0 0 0;">Rp 0</p>
                </div>
            </div>
        </div>

        <div class="form-transaksi">
            <h3>Tambah Transaksi Baru</h3>
            <input type="text" id="deskripsi" placeholder="Contoh: Beli di Toko Seberang">
            <input type="number" id="nominal" placeholder="Nominal (Rp)">
            <input type="date" id="tanggal"> 
            
            <select id="jenis" onchange="updateKategoriOptions()">
                <option value="pemasukan">Pemasukan (+)</option>
                <option value="pengeluaran">Pengeluaran (-)</option>
            </select>

            <select id="kategori" onchange="cekKategoriLainnya()">
                </select>

            <input type="text" id="kategori-baru-input" placeholder="Ketik nama kategori baru..." style="display: none; margin-top: 10px;">

            <button onclick="tambahTransaksi()">Simpan</button>
        </div>

        <div id="box-grafik-container" class="form-transaksi" style="margin-bottom: 20px; display: none;">
            <h3 style="text-align: center;">📊 Presentasi Pengeluaran Periode Ini</h3>
            <div style="display: flex; flex-direction: column; gap: 20px; align-items: center;">
                <div style="position: relative; width: 100%; max-width: 300px;">
                    <canvas id="grafikKategori"></canvas>
                </div>
            </div>
        </div>

        <div class="riwayat">
            <h3>Riwayat Transaksi</h3>
            
            <div style="margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; gap: 10px;">
                <div>
                    <label for="filter-bulan" style="font-size: 14px; color: #666; font-weight: bold;">Pilih Periode: </label>
                    <select id="filter-bulan" onchange="updateUI()" style="padding: 8px; width: auto; display: inline-block; margin: 0;">
                        </select>
                </div>
                
                <button onclick="downloadExcel()" style="background: #11998e; font-size: 13px; padding: 8px 12px; width: auto; margin: 0;">
                    📊 Unduh Excel
                </button>
            </div>

            <ul id="daftar-transaksi">
                </ul>
        </div>
        
        <p style="text-align: center; font-size: 11px; color: #aaa; margin-top: 30px;">
            © Pencatat Keuangan Premium. Lisensi Penggunaan Pribadi. Dilarang Memperjualbelikan Ulang Kode Ini.
        </p>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
